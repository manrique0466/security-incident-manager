services:
  postgres:
    image: postgres:16-alpine
    container_name: incident_manager_db
    environment:
      POSTGRES_DB: incident_manager
      POSTGRES_USER: appuser
      POSTGRES_PASSWORD: apppassword
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appuser -d incident_manager"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: